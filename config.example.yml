telegram:
  token: "SEU_TOKEN_DO_BOT_AQUI"
  allowed_user_ids: []  # vazio = aceita qualquer usuário. Ex: [123456789, 987654321]
  language: "pt-BR"

ollama:
  base_url: "http://ollama:11434"  # nome do serviço no docker-compose

models:
  classifier:
    name: qwen3.5:0.8b        # modelo leve só para classificar intenção
  default:
    name: qwen3.5:4b        # modelo principal para respostas gerais
  code:
    name: qwen2.5-coder:7b # modelo focado em código (opcional)
  vision:
    name: llava:7b          # modelo para imagens (opcional)

skills:
  shell:
    enabled: true
    timeout_seconds: 60
  web_search:
    enabled: false          # requer SearXNG rodando localmente
    searxng_url: "http://localhost:8080"

orchestrator:
  max_steps_per_task: 8
  step_timeout_seconds: 120
